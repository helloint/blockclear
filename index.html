<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>红色方块消除蓝色方块游戏</title>
    <style>
        :root {
            --n: 12;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;  /* 水平居中 */
            align-items: center;      /* 垂直居中 */
            height: 100vh;            /* 让 body 高度占满视口 */
            margin: 0;                /* 移除默认边距 */
        }
        .canvas {
            display: flex;
            flex-wrap: wrap;
            width: calc(var(--n) * 41px);
            position: relative;
        }
        @media (max-width: 768px) { /* 移动端适配 */
            .canvas {
                width: 100vw;
            }
        }

        .cell {
            width: 40px;
            height: 40px;
            background-color: white;  /* 默认背景颜色 */
            border: 0.5px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        @media (max-width: 768px) { /* 移动端适配 */
            .cell {
                width: calc(100vw / var(--n));
                height: calc(100vw / var(--n));
            }
        }

        .cell-edge {
            background-color: #d3d3d3;  /* 浅灰色背景 */
        }

        .blue { background-color: blue; }
        @keyframes redColorPulse {
            0% { background-color: #ff2a2a; }
            50% { background-color: #c40000; }
            100% { background-color: #ff2a2a; }
        }

        .red {
            background-color: #ff2a2a;
            cursor: pointer;
        }
        .red-with-number {
            color: white;
            font-weight: bold;
        }
        .moving-red {
            background-color: #ff2a2a;
            animation: redColorPulse 0.8s ease-in-out infinite;
        }

        .overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid black;
            padding: 20px 24px;
            display: none;
            text-align: center;
            z-index: 10;
            min-width: 220px;
        }
        .overlay-close {
            position: absolute;
            top: 6px;
            right: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        .button-container {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .top-panel {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }
        .top-panel input {
            width: 30px;
            margin: 5px;
            padding: 5px;
        }
        .bottom-panel {
            margin-top: 10px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
            padding: 0 12px;
            box-sizing: border-box;
        }
        .bottom-panel button,
        .button-container button {
            padding: 10px 16px;
            font-size: 16px;
            min-width: 110px;
            border-radius: 6px;
        }
        .path {
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .bottom-panel button,
            .button-container button {
                padding: 14px 18px;
                font-size: 18px;
                min-width: 140px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .moving-red {
                animation: none;
            }
        }
    </style>
</head>
<body>
<div class="top-panel">
    <label for="rows">行数：</label>
    <input type="number" id="rows" value="8">
    <label for="cols">列数：</label>
    <input type="number" id="cols" value="8">
    <label for="blockCount">方块数：</label>
    <input type="number" id="blockCount" value="8">
</div>

<div class="canvas" id="canvas"></div>
<div class="overlay-container" id="overlay-container">
    <div class="overlay" id="overlay">
        <button class="overlay-close" onclick="closeOverlay()">×</button>
        <p id="message"></p>
        <div class="button-container">
            <button id="btn-primary" onclick="newGame()">新游戏</button>
            <button id="btn-secondary" onclick="replayGame()">重新开始</button>
        </div>
    </div>
</div>

<div class="bottom-panel">
    <button onclick="newGame()">新游戏</button>
    <button onclick="replayGame()">重新开始</button>
    <button onclick="toggleHint()">💡提示</button>
</div>

<script>
    let rows, cols, blockCount;
    const canvas = document.getElementById('canvas');
    const message = document.getElementById('message');
    const overlay = document.getElementById('overlay');
    const overlayContainer = document.getElementById('overlay-container');

    let grid, remainingRed, redPositions, bluePositions, redNumbers, hintActive = false;
    let hintOffset = 0;          // 已经消耗的红块数量
    let currentHintOrder = null; // 当前局面的可行解（红块顺序）
    let activeMoves = 0;        // 当前同时在移动的红块数量
    let moveAnimSeq = 0;       // 每次移动动画的自增 token（避免并发残影互相干扰）
    let luckMode = false;       // “继续尝试”：关闭提前失败弹层后继续游戏且不再重复提示
    let failurePromptShown = false; // 提前失败弹层是否已经显示过（用于避免重复弹出）
    let overlayState = null;    // 当前弹层类型：success / failFinal / failPredict

    function initializeGame(reset = true) {
        overlay.style.display = 'none';
        overlayContainer.style.display = 'none';
        hintActive = false;
        currentHintOrder = null;
        hintOffset = 0;
        activeMoves = 0;
        luckMode = false;
        failurePromptShown = false;
        overlayState = null;

        if (reset) {
            rows = parseInt(document.getElementById('rows').value);
            cols = parseInt(document.getElementById('cols').value);
            blockCount = parseInt(document.getElementById('blockCount').value);
        }

        grid = Array.from({ length: rows }, () => Array(cols).fill(null));
        remainingRed = blockCount;

        if (reset) {
            bluePositions = getConnectedCenterPositions(blockCount);
        }
        bluePositions.forEach(({ x, y }) => grid[y][x] = 'blue');

        if (reset) {
            redPositions = getValidRedPositions(bluePositions);
        }
        redNumbers = Array.from({ length: blockCount }, (_, i) => i + 1);
        redPositions.forEach(pos => grid[pos.y][pos.x] = 'red');

        drawGrid();
        document.documentElement.style.setProperty('--n', cols);
    }

    function getConnectedCenterPositions(count) {
        let positions = [];
        let startX = Math.floor(cols / 2), startY = Math.floor(rows / 2);
        positions.push({ x: startX, y: startY });
        while (positions.length < count) {
            let last = positions[Math.floor(Math.random() * positions.length)];
            let directions = [
                { x: last.x + 1, y: last.y },
                { x: last.x - 1, y: last.y },
                { x: last.x, y: last.y + 1 },
                { x: last.x, y: last.y - 1 }
            ].filter(p =>
                p.x > 0 && p.x < cols - 1 && p.y > 0 && p.y < rows - 1 &&
                !positions.some(pos => pos.x === p.x && pos.y === p.y)
            );
            if (directions.length) {
                positions.push(directions[Math.floor(Math.random() * directions.length)]);
            }
        }
        return positions;
    }

    // 保留你原来的红块生成方式
    function getValidRedPositions(bluePositions) {
        let redPositions;
        let availableBlues = [...bluePositions];
        let maxRetry = 10;
        let count = 0;
        do {
            redPositions = [];
            while (redPositions.length < blockCount && availableBlues.length > 0) {
                let target = availableBlues.pop();
                let candidates = [
                    { x: 0, y: target.y }, { x: cols - 1, y: target.y },
                    { x: target.x, y: 0 }, { x: target.x, y: rows - 1 }
                ].filter(p => !redPositions.some(r => r.x === p.x && r.y === p.y));
                if (candidates.length) {
                    redPositions.push(candidates[Math.floor(Math.random() * candidates.length)]);
                }
            }
            count = count + 1;
        } while (redPositions.length < availableBlues.length && count < maxRetry);

        return redPositions;
    }

    function drawGrid() {
        canvas.innerHTML = '';

        // 如果正在显示提示，每次重绘前按当前局面重新求解一条路径
        if (hintActive) {
            currentHintOrder = findSolutionForCurrentGrid();
        } else {
            currentHintOrder = null;
        }

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let cell = document.createElement('div');
                cell.classList.add('cell');

                // 画布四边
                if (x === 0 || y === 0 || x === cols - 1 || y === rows - 1) {
                    cell.classList.add('cell-edge');
                }

                if (grid[y][x] === 'blue') {
                    cell.classList.add('blue');
                }
                if (grid[y][x] === 'red') {
                    cell.classList.add('red');
                    if (hintActive && currentHintOrder) {
                        const idx = currentHintOrder.findIndex(pos => pos.x === x && pos.y === y);
                        if (idx !== -1) {
                            cell.textContent = hintOffset + idx + 1;
                            cell.classList.add('red-with-number');
                        }
                    }
                    cell.addEventListener('click', () => removeClosestBlue(x, y));
                }

                canvas.appendChild(cell);
            }
        }
    }

    function findClosestBlueInGrid(x, y, g) {
        let closest = null, minDistance = Infinity;
        for (let j = 0; j < rows; j++) {
            for (let i = 0; i < cols; i++) {
                if (g[j][i] === 'blue' && (i === x || j === y)) {
                    let distance = Math.abs(i - x) + Math.abs(j - y);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closest = { x: i, y: j };
                    }
                }
            }
        }
        return closest;
    }

    function removeClosestBlue(x, y) {
        // 只允许点击边缘红块
        const isEdge =
            x === 0 || x === cols - 1 ||
            y === 0 || y === rows - 1;
        if (!isEdge) return;

        // 计算移动方向（从边缘向内）
        let dx = 0, dy = 0;
        if (x === 0) dx = 1;
        else if (x === cols - 1) dx = -1;
        else if (y === 0) dy = 1;
        else if (y === rows - 1) dy = -1;

        const path = [];
        let cx = x;
        let cy = y;
        let hitBlue = null;

        while (true) {
            cx += dx;
            cy += dy;
            if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) break;

            // 先判断是否撞到蓝块
            if (grid[cy][cx] === 'blue') {
                path.push({ x: cx, y: cy });
                hitBlue = { x: cx, y: cy };
                break;
            }

            // 没有蓝块，若已经到达对侧灰色边缘，则停止，不把灰色格纳入路径
            const isEdgeCell =
                cx === 0 || cx === cols - 1 ||
                cy === 0 || cy === rows - 1;
            if (isEdgeCell) {
                break;
            }

            path.push({ x: cx, y: cy });
        }

        if (path.length === 0) return;

        // 计算当前红块在提示序列中的编号（如果有的话）
        let moveLabel = null;
        if (hintActive && currentHintOrder) {
            const idx = currentHintOrder.findIndex(pos => pos.x === x && pos.y === y);
            if (idx !== -1) {
                moveLabel = hintOffset + idx + 1;
            }
        }

        // 当前红块开始移动：增加活动数量
        activeMoves++;

        // 立即从棋盘中移除边缘红块（它开始移动了）
        grid[y][x] = null;
        remainingRed--;
        hintOffset = blockCount - remainingRed;

        // 把起始格上的样式和数字去掉，让视觉上边缘红块立刻消失，
        // 数字跟随后面的移动红块显示
        const startIndex = y * cols + x;
        const startCell = canvas.children[startIndex];
        if (startCell) {
            startCell.classList.remove('red');
            startCell.classList.remove('moving-red');
            startCell.textContent = '';
            startCell.classList.remove('red-with-number');
        }

        // 动画最后一帧再同时移除蓝块，并在所有移动都结束后统一判断胜负/重绘
        animateRedMove(path, moveLabel, () => {
            if (hitBlue) {
                grid[hitBlue.y][hitBlue.x] = null;
                // 只更新被撞到的蓝块格子，避免 drawGrid 打断其它正在移动的动画
                const hitIndex = hitBlue.y * cols + hitBlue.x;
                const hitCell = canvas.children[hitIndex];
                if (hitCell) {
                    hitCell.classList.remove('blue');
                    hitCell.textContent = '';
                }
            }

            activeMoves--;
            if (activeMoves === 0) {
                checkGameStatus();
                drawGrid();
            }
        });
    }

    // 普通步进动画：下一步点亮时，立刻清除上一格
    function animateRedMove(path, moveLabel, onComplete) {
        const cells = canvas.children;
        const stepMs = 150; // 每格延迟（与 setTimeout 保持一致）

        const animToken = ++moveAnimSeq;
        let prevIndex = null;

        path.forEach((pos, idx) => {
            setTimeout(() => {
                // 先清除上一格，避免残影
                if (prevIndex !== null && cells[prevIndex]) {
                    const prevCell = cells[prevIndex];
                    if (prevCell.dataset.movingRedAnim === String(animToken)) {
                        prevCell.classList.remove('moving-red');
                        if (moveLabel != null) {
                            prevCell.textContent = '';
                            prevCell.classList.remove('red-with-number');
                        }
                        delete prevCell.dataset.movingRedAnim;
                    }
                }

                const currentIndex = pos.y * cols + pos.x;
                const cell = cells[currentIndex];
                if (!cell) return;

                // 标记本次动画对当前格的“占用”，避免并发移动互相清理
                cell.dataset.movingRedAnim = String(animToken);
                cell.classList.add('moving-red');
                if (moveLabel != null) {
                    cell.textContent = moveLabel;
                    cell.classList.add('red-with-number');
                }

                prevIndex = currentIndex;

                // 最后一格：触发业务回调（蓝块/胜负等）
                if (idx === path.length - 1 && typeof onComplete === 'function') {
                    setTimeout(onComplete, 50);
                }
            }, idx * stepMs);
        });
    }

    function checkGameStatus() {
        let remainingBlue = grid.flat().filter(cell => cell === 'blue').length;

        // 成功：没有蓝块
        if (remainingBlue === 0) {
            message.textContent = '🏅游戏成功！';
            overlayState = 'success';
            luckMode = false;
            failurePromptShown = false;
            document.getElementById('btn-secondary').style.display = '';
            document.getElementById('btn-primary').textContent = '新游戏';
            document.getElementById('btn-primary').onclick = newGame;
            document.getElementById('btn-secondary').textContent = '重新开始';
            document.getElementById('btn-secondary').onclick = replayGame;
            overlay.style.display = 'block';
            overlayContainer.style.display = 'flex';
            return;
        }

        // 失败 1：没有红块了
        if (remainingRed === 0) {
            message.textContent = '🙅游戏失败！';
            overlayState = 'failFinal';
            luckMode = false;
            failurePromptShown = false;
            document.getElementById('btn-secondary').style.display = '';
            document.getElementById('btn-primary').textContent = '新游戏';
            document.getElementById('btn-primary').onclick = newGame;
            document.getElementById('btn-secondary').textContent = '重新开始';
            document.getElementById('btn-secondary').onclick = replayGame;
            overlay.style.display = 'block';
            overlayContainer.style.display = 'flex';
            return;
        }

        // 如果已经进入“继续尝试”，则只等红块用完时给出最终失败提示
        if (luckMode) return;

        // 如果提前失败弹层已经显示过，则不再重复计算和弹出
        if (failurePromptShown) return;

        // 失败 2（快速剪枝）：没有任意一对红蓝在同一行或同一列，必然无解
        const reds = getRedPositionsFromGrid(grid);
        const blues = getBluePositionsFromGrid(grid);
        let hasSameLinePair = false;
        outer:
        for (const r of reds) {
            for (const b of blues) {
                if (r.x === b.x || r.y === b.y) {
                    hasSameLinePair = true;
                    break outer;
                }
            }
        }
        if (!hasSameLinePair) {
            message.textContent = '🙅游戏失败！已无消除方案';
            overlayState = 'failPredict';
            failurePromptShown = true;
            // 提前失败弹层按钮：重新开始 / 继续尝试
            document.getElementById('btn-secondary').style.display = '';
            document.getElementById('btn-primary').textContent = '重新开始';
            document.getElementById('btn-primary').onclick = replayGame;
            document.getElementById('btn-secondary').textContent = '继续尝试';
            document.getElementById('btn-secondary').onclick = luckContinue;
            overlay.style.display = 'block';
            overlayContainer.style.display = 'flex';
            return;
        }

        // 失败 3：DFS 严格模拟后确认无解
        const possible = findSolutionForCurrentGrid();
        if (!possible || possible.length === 0) {
            message.textContent = '🙅游戏失败！已无消除方案';
            overlayState = 'failPredict';
            failurePromptShown = true;
            document.getElementById('btn-secondary').style.display = '';
            document.getElementById('btn-primary').textContent = '重新开始';
            document.getElementById('btn-primary').onclick = replayGame;
            document.getElementById('btn-secondary').textContent = '继续尝试';
            document.getElementById('btn-secondary').onclick = luckContinue;
            overlay.style.display = 'block';
            overlayContainer.style.display = 'flex';
        }
    }

    function newGame() {
        initializeGame();
    }

    function replayGame() {
        initializeGame(false);
    }

    function setCookie(name, value, days) {
        const maxAge = days * 24 * 60 * 60;
        document.cookie = `${name}=${encodeURIComponent(value)}; max-age=${maxAge}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
        const cookies = document.cookie.split(';').map(s => s.trim()).filter(Boolean);
        const prefix = name + '=';
        for (const c of cookies) {
            if (c.startsWith(prefix)) {
                return decodeURIComponent(c.substring(prefix.length));
            }
        }
        return null;
    }

    const WELCOME_COOKIE = 'blockclear_welcome_seen';

    function closeOverlay() {
        // 关闭提前失败弹层时，等同于“继续尝试”
        if (overlayState === 'failPredict') {
            luckMode = true;
            failurePromptShown = true;
        } else if (overlayState === 'welcome') {
            // 第一次访问说明弹层关闭后，写 cookie 不再提示
            setCookie(WELCOME_COOKIE, '1', 365);
        }

        overlay.style.display = 'none';
        overlayContainer.style.display = 'none';
        overlayState = null;
    }

    function luckContinue() {
        // 关闭提前失败弹层并继续游戏，不再中途重复失败提示
        if (overlayState === 'failPredict') {
            luckMode = true;
            failurePromptShown = true;
        }
        closeOverlay();
    }

    function showWelcomeIfFirstVisit() {
        // 仅首次访问显示说明（cookie 记录）
        if (getCookie(WELCOME_COOKIE) === '1') return;

        overlayState = 'welcome';
        luckMode = false;
        failurePromptShown = false;

        message.textContent = '用红色块消灭所有蓝色块';

        // 欢迎弹层只保留一个主按钮用于关闭
        document.getElementById('btn-secondary').style.display = 'none';
        document.getElementById('btn-primary').textContent = '开始游戏';
        document.getElementById('btn-primary').onclick = closeOverlay;

        overlay.style.display = 'block';
        overlayContainer.style.display = 'flex';
    }

    // 开关提示：打开时从当前局面计算一条可行解
    function toggleHint() {
        hintActive = !hintActive;
        if (hintActive) {
            hintOffset = blockCount - remainingRed;
            currentHintOrder = findSolutionForCurrentGrid();
        } else {
            currentHintOrder = null;
        }
        drawGrid();
    }

    // ---------- 求解器：从当前局面找一条可行路径（与实际移动规则完全一致） ----------

    function cloneGrid(src) {
        return src.map(row => row.slice());
    }

    function getRedPositionsFromGrid(g) {
        const reds = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (g[y][x] === 'red') {
                    reds.push({ x, y });
                }
            }
        }
        return reds;
    }

    function getBluePositionsFromGrid(g) {
        const blues = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (g[y][x] === 'blue') {
                    blues.push({ x, y });
                }
            }
        }
        return blues;
    }

    function encodeState(g) {
        const reds = getRedPositionsFromGrid(g)
            .map(p => `${p.x},${p.y}`)
            .sort()
            .join('|');
        const blues = getBluePositionsFromGrid(g)
            .map(p => `${p.x},${p.y}`)
            .sort()
            .join('|');
        return `R:${reds};B:${blues}`;
    }

    // 在给定棋盘上模拟一次红块点击，返回新的棋盘
    function simulateMoveOnGrid(curGrid, r) {
        const { x, y } = r;

        // 只能点击边缘红块
        const isEdge =
            x === 0 || x === cols - 1 ||
            y === 0 || y === rows - 1;
        if (!isEdge) return null;

        // 计算移动方向（从边缘向内）
        let dx = 0, dy = 0;
        if (x === 0) dx = 1;
        else if (x === cols - 1) dx = -1;
        else if (y === 0) dy = 1;
        else if (y === rows - 1) dy = -1;

        let cx = x;
        let cy = y;
        let hitBlue = null;

        while (true) {
            cx += dx;
            cy += dy;
            if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) break;

            // 先判断是否撞到蓝块
            if (curGrid[cy][cx] === 'blue') {
                hitBlue = { x: cx, y: cy };
                break;
            }

            // 没有蓝块，若已经到达对侧灰色边缘，则停止
            const isEdgeCell =
                cx === 0 || cx === cols - 1 ||
                cy === 0 || cy === rows - 1;
            if (isEdgeCell) {
                break;
            }
        }

        // 红块原地就直接消失（无路径或路径长度为 0）
        const nextGrid = cloneGrid(curGrid);
        nextGrid[y][x] = null;

        if (hitBlue) {
            nextGrid[hitBlue.y][hitBlue.x] = null;
        }

        return nextGrid;
    }

    // DFS + 记忆化：返回一个红块点击顺序（如果存在解），使用与实际游戏相同的移动规则
    function findSolutionForCurrentGrid() {
        const startGrid = cloneGrid(grid);
        const visited = new Set();

        function dfs(curGrid, sequence) {
            const key = encodeState(curGrid);
            if (visited.has(key)) return null;
            visited.add(key);

            const blues = getBluePositionsFromGrid(curGrid);
            if (blues.length === 0) {
                return sequence;
            }

            const reds = getRedPositionsFromGrid(curGrid);
            if (reds.length === 0) return null;

            for (const r of reds) {
                const nextGrid = simulateMoveOnGrid(curGrid, r);
                if (!nextGrid) continue;

                const res = dfs(nextGrid, sequence.concat({ x: r.x, y: r.y }));
                if (res) return res;
            }

            return null;
        }

        return dfs(startGrid, []);
    }

    initializeGame();
    showWelcomeIfFirstVisit();
</script>
